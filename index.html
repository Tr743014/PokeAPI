<!DOCTYPE html>
<html>
<head>
    <title>Pokemon Team Builder</title>

    <style>
        /* Styling for the page */
        body {
            background-color: #8fb3bf;
            font-family: serif;
        }

        /* Main Content */
        .container {
            width: 700px;
            margin: 40px auto;
            background-color: white;
            border: 8px solid #d4a017;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
        }

        /* Elements */
        h1 {
            margin-bottom: 10px;
        }

        /* Input and Button */
        input {
            width: 250px;
            padding: 5px;
        }

        button {
            padding: 5px 12px;
            margin-top: 10px;
        }

        /* Pokemon Display */
        #pokemonImage {
            width: 250px;
            margin: 20px 0;
        }


        #moveSelection {
            margin-top: 20px;
        }
        .move-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 40px;
            justify-content: center;
            margin: 20px auto;
            width: 500px;
        }

        select {
            width: 200px;
            padding: 3px;
        }

        /* Team Display */
        .team-card {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            border: 1px solid black;
            padding: 15px;
            margin-top: 15px;
            background-color: white;
        }

        .team-card img {
            width: 100px;
        }

        .team-card ul {
            text-align: left;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Name or ID</h2>

    <input type="text" id="pokemonInput">
    <button id="submitBtn">Find</button>

    <div id="pokemonDisplay">
        <img id="pokemonImage" src="">
        <br>
        <audio id="pokemonAudio" controls></audio>
    </div>

    <div id="moveSelection" style="display:none;">
        <div class="move-grid">
            <select id="move1"></select>
            <select id="move2"></select>
            <select id="move3"></select>
            <select id="move4"></select>
        </div>
        <button id="addToTeam">Add to Team</button>
    </div>

    <div id="team"></div>

</div>

<script>

// Store fetched Pokemon data
const cache = {};
// Stores current pokemon being displayed
let currentPokemon = null;

// Event Listeners
document.getElementById("submitBtn").addEventListener("click", fetchPokemon);
document.getElementById("addToTeam").addEventListener("click", addToTeam);

// Fetch Pokemon data from PokeAPI
function fetchPokemon() {

    const input = document.getElementById("pokemonInput").value.toLowerCase();
    if (!input) return;

    if (cache[input]) {
        displayPokemon(cache[input]);
        return;
    }

    fetch(`https://pokeapi.co/api/v2/pokemon/${input}`)
        .then(res => res.json())
        .then(data => {
            cache[input] = data;
            displayPokemon(data);
        })
        .catch(() => alert("Pokemon not found"));
}

// Display Pokemon data on the page
function displayPokemon(data) {

    currentPokemon = data;

    // Image (pixel sprite)
    document.getElementById("pokemonImage").src =
        data.sprites.front_default;

    // Audio
    if (data.cries && data.cries.latest) {
        document.getElementById("pokemonAudio").src =
            data.cries.latest;
    }

    // Moves
    const moves = data.moves.slice(0, 20);

    // 4 dropdowns for moves
    for (let i = 1; i <= 4; i++) {
        const dropdown = document.getElementById(`move${i}`);
        dropdown.innerHTML = "";

        moves.forEach(move => {
            const option = document.createElement("option");
            option.value = move.move.name;
            option.textContent = move.move.name;
            dropdown.appendChild(option);
        });
    }

    document.getElementById("moveSelection").style.display = "block";
}

// Add the current Pokemon and selected moves to the team display
function addToTeam() {

    if (!currentPokemon) return;

    const team = document.getElementById("team");

    // Create a card for the Pokemon
    const card = document.createElement("div");
    card.className = "team-card";

    const img = document.createElement("img");
    img.src = currentPokemon.sprites.front_default;

    const moveList = document.createElement("ul");

    for (let i = 1; i <= 4; i++) {
        const li = document.createElement("li");
        li.textContent = document.getElementById(`move${i}`).value;
        moveList.appendChild(li);
    }

    card.appendChild(img);
    card.appendChild(moveList);

    team.appendChild(card);
}

</script>

</body>
</html>
